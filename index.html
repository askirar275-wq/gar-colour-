<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Highway Racer 3D</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

canvas{
display:block;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:#fff;
z-index:100;
font-size:20px;
font-weight:bold;
background:rgba(0,0,0,.45);
padding:10px 18px;
border-radius:14px;
border:2px solid #fff;
}

#left,#right{
position:absolute;
bottom:25px;
width:90px;
height:90px;
border-radius:50%;
border:3px solid #fff;
background:rgba(255,255,255,.15);
color:#fff;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
}

#left{
left:20px;
}

#right{
right:20px;
}

#left:active,#right:active{
transform:scale(.9);
background:#00aaff;
}
</style>
</head>

<body>

<div id="hud">
Speed : <span id="speed">0</span> km/h
</div>

<div id="left">◀</div>
<div id="right">▶</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({antialias:true});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,2);
light.position.set(0,20,20);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,.8));

const roadGeo=new THREE.PlaneGeometry(12,400);

const roadMat=new THREE.MeshPhongMaterial({
color:0x444444
});

const road=new THREE.Mesh(
roadGeo,
roadMat
);

road.rotation.x=-Math.PI/2;
road.position.z=-150;

scene.add(road);

const lineMat=new THREE.MeshBasicMaterial({
color:0xffffff
});

for(let i=0;i<70;i++){

const line=new THREE.Mesh(
new THREE.BoxGeometry(.2,.02,4),
lineMat
);

line.position.set(
0,
.02,
-i*6
);

scene.add(line);

}

const grassMat=new THREE.MeshPhongMaterial({
color:0x228B22
});

const leftGrass=new THREE.Mesh(
new THREE.PlaneGeometry(50,400),
grassMat
);

leftGrass.rotation.x=-Math.PI/2;
leftGrass.position.set(-31,0,-150);

scene.add(leftGrass);

const rightGrass=leftGrass.clone();
rightGrass.position.x=31;
scene.add(rightGrass);

const car=new THREE.Group();

const body=new THREE.Mesh(
new THREE.BoxGeometry(2,1,4),
new THREE.MeshPhongMaterial({
color:0xff0000
})
);

body.position.y=.8;
car.add(body);

const top=new THREE.Mesh(
new THREE.BoxGeometry(1.6,.7,2),
new THREE.MeshPhongMaterial({
color:0x111111
})
);

top.position.set(0,1.4,-.2);

car.add(top);

scene.add(car);

camera.position.set(0,5,10);

let speed=0;
let moveLeft=false;
let moveRight=false;

left.onpointerdown=()=>moveLeft=true;
left.onpointerup=()=>moveLeft=false;

right.onpointerdown=()=>moveRight=true;
right.onpointerup=()=>moveRight=false;

window.addEventListener("resize",()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

function animate(){

requestAnimationFrame(animate);

speed+=0.05;

if(speed>220)
speed=220;

if(moveLeft)
car.position.x-=0.12;

if(moveRight)
car.position.x+=0.12;

car.position.x=Math.max(
-4,
Math.min(4,car.position.x)
);

camera.position.x+=(car.position.x-camera.position.x)*0.08;

camera.lookAt(
car.position.x,
1,
car.position.z-15
);

road.position.z+=speed*0.03;

if(road.position.z>150)
road.position.z=-150;

document.getElementById("speed").innerHTML=
Math.floor(speed);

renderer.render(scene,camera);

}

animate();

</script>

</body>
  </html>
