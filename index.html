<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Zombie Shooter</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
    <div id="score">⭐ Score : 0</div>
    <div id="health">❤️ Health : 100</div>
</div>

<div id="game">

    <!-- Forest -->
    <div id="forest"></div>

    <!-- Trees -->
    <div class="tree" style="left:50px;top:70px;">🌲</div>
    <div class="tree" style="left:280px;top:160px;">🌳</div>
    <div class="tree" style="left:120px;top:320px;">🌲</div>

    <!-- Rocks -->
    <div class="rock" style="left:210px;top:260px;">🪨</div>

    <!-- Player -->
    <div id="player">🪖</div>

</div>

<button id="moveLeft">⬅️</button>
<button id="moveRight">➡️</button>

<script src="player.js"></script>
<script src="bullet.js"></script>
<script src="zombie.js"></script>
<script src="controls.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
